<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Arham's TaskFlow</title>
    <style>
        .completed { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h1>Welcome to Arham's TaskFlow</h1>

    <form method="POST" action="{{ url_for('index') }}">
        <input type="text" name="task" placeholder="Enter a task" required>
        <button type="submit">Add Task</button>
    </form>

    <h2>Your Tasks:</h2>
    <ul>
    {% for task in tasks %}
        <li {% if task.completed %}class="completed"{% endif %}>
            {{ task.text }}
            {% if not task.completed %}
                <a href="{{ url_for('complete_task', task_id=task.id) }}" style="color:green; margin-left:10px;">[Complete]</a>
            {% else %}
                <a href="{{ url_for('complete_task', task_id=task.id) }}" style="color:orange; margin-left:10px;">[Undo]</a>
            {% endif %}
            <a href="{{ url_for('delete_task', task_id=task.id) }}" style="color:red; margin-left:10px;">[Delete]</a>
        </li>
    {% else %}
        <li>No tasks yet!</li>
    {% endfor %}
    </ul>
</body>
</html>
