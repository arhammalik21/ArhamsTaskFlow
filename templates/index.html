<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>
    <h1>Welcome to Task Manager</h1>

    <form method="POST">
        <input type="text" name="task" placeholder="Enter a task" required>
        <button type="submit">Add Task</button>
    </form>

    <h2>Your Tasks:</h2>
    <ul>
    {% for task in tasks %}
        <li>
            {{ task.text }}
            <a href="{{ url_for('delete_task', task_id=task.id) }}" style="color:red; text-decoration:none; margin-left:10px;">[Delete]</a>
        </li>
    {% else %}
        <li>No tasks yet!</li>
    {% endfor %}
</ul>
                   

</body>
</html>
