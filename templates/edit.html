<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Edit Task</title>
    <style>
        body { font-family: Arial,sans-serif; max-width:400px; margin:20px auto; background: #f9f9f9; }
        .flash-info { background: #cce5ff; color: #004085; padding:8px; border-radius:4px; margin-bottom:10px; }
        label { display:block; margin-bottom:5px; }
        input[type="text"] { width:100%; padding:10px; border-radius:4px; border:1px solid #ddd; margin-bottom:10px;}
        button { padding:10px 15px; background:#007bff; color:white; border:none; border-radius:4px;}
    </style>
</head>
<body>
    <h2>Edit Task</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-{{category}}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form action="" method="POST">
        {{ form.hidden_tag() }}
        {{ form.task.label }}
        {{ form.task(value=task.name, required=True) }}
        <button type="submit">Save Changes</button>
        <a href="{{ url_for('index') }}" style="margin-left:10px;">Cancel</a>
    </form>
</body>
</html>
